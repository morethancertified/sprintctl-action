name: 'CloudSprints Grader'
description: 'Grade CloudSprints labs via pull request. Parses lesson token from branch name (grade/<token>), identifies student by Git email, runs validation commands, and submits for AI grading.'
author: 'CloudSprints'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  api-key:
    description: 'CloudSprints API key for GitHub Actions (from repository secret CLOUDSPRINTS_API_KEY)'
    required: true
  api-url:
    description: 'CloudSprints API base URL'
    required: false
    default: 'https://cloudsprints.com'
  branch-prefix:
    description: 'Branch prefix that triggers grading'
    required: false
    default: 'grade/'
  callback-url:
    description: 'URL to POST grading results for GitHub App check run updates'
    required: false
    default: ''

outputs:
  lesson-token:
    description: 'The lesson token extracted from the branch name'
    value: ${{ steps.extract.outputs.lesson_token }}
  email:
    description: 'The student email detected from the PR'
    value: ${{ steps.identity.outputs.email }}
  passed:
    description: 'Number of tasks that passed'
    value: ${{ steps.grade.outputs.passed }}
  failed:
    description: 'Number of tasks that failed'
    value: ${{ steps.grade.outputs.failed }}
  total:
    description: 'Total number of tasks'
    value: ${{ steps.grade.outputs.total }}
  status:
    description: 'Overall grading status (pass or fail)'
    value: ${{ steps.grade.outputs.status }}
  results-json:
    description: 'Full grading results as JSON'
    value: ${{ steps.grade.outputs.results_json }}

runs:
  using: 'composite'
  steps:
    # Step 1: Extract lesson token from branch name
    - name: Extract lesson token from branch
      id: extract
      shell: bash
      run: |
        BRANCH="${{ github.head_ref || github.ref_name }}"
        PREFIX="${{ inputs.branch-prefix }}"
        echo "::group::Branch Detection"
        echo "Branch: $BRANCH"
        echo "Prefix: $PREFIX"

        if [[ "$BRANCH" == ${PREFIX}* ]]; then
          LESSON_TOKEN="${BRANCH#${PREFIX}}"
          echo "Lesson token: $LESSON_TOKEN"
          echo "lesson_token=$LESSON_TOKEN" >> $GITHUB_OUTPUT
        else
          echo "::error::Branch '$BRANCH' does not start with '${PREFIX}'. Name your branch '${PREFIX}<lesson-token>' to trigger grading."
          exit 1
        fi
        echo "::endgroup::"

    # Step 2: Detect student email from Git commit
    - name: Detect student identity
      id: identity
      shell: bash
      run: |
        echo "::group::Student Identity"
        # Get email from the latest commit author
        EMAIL=$(git log -1 --format='%ae' 2>/dev/null || echo "")

        if [ -z "$EMAIL" ]; then
          echo "::error::Could not detect student email from Git commit. Make sure you have committed your work."
          exit 1
        fi

        echo "Student email: $EMAIL"
        echo "email=$EMAIL" >> $GITHUB_OUTPUT
        echo "::endgroup::"

    # Step 3: Fetch lesson details from API
    - name: Fetch lesson details
      id: lesson
      shell: bash
      run: |
        echo "::group::Fetching Lesson"
        LESSON_TOKEN="${{ steps.extract.outputs.lesson_token }}"
        EMAIL="${{ steps.identity.outputs.email }}"
        API_URL="${{ inputs.api-url }}"

        PAYLOAD=$(jq -nc \
          --arg action "fetch" \
          --arg email "$EMAIL" \
          --arg user_lesson_id "$LESSON_TOKEN" \
          '{action: $action, email: $email, user_lesson_id: $user_lesson_id}')

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST \
          -H "X-API-Key: ${{ inputs.api-key }}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "${API_URL}/api/github/grade" 2>&1) || true

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" != "200" ]; then
          echo "::error::Failed to fetch lesson (HTTP $HTTP_CODE). Check that your email ($EMAIL) is registered and lesson token ($LESSON_TOKEN) is correct."
          echo "Response: $BODY"
          exit 1
        fi

        CLI_COMMANDS=$(echo "$BODY" | jq -c '.cli_commands // []')
        TASK_COUNT=$(echo "$BODY" | jq '.tasks | length')
        LESSON_ID=$(echo "$BODY" | jq -r '.id')

        echo "Lesson ID: $LESSON_ID"
        echo "Tasks: $TASK_COUNT"
        echo "CLI Commands: $CLI_COMMANDS"

        echo "cli_commands=$CLI_COMMANDS" >> $GITHUB_OUTPUT
        echo "task_count=$TASK_COUNT" >> $GITHUB_OUTPUT
        echo "lesson_id=$LESSON_ID" >> $GITHUB_OUTPUT
        echo "::endgroup::"

    # Step 4: Run CLI validation commands
    - name: Run validation commands
      id: validate
      shell: bash
      run: |
        echo "::group::Running Validation Commands"
        CLI_COMMANDS='${{ steps.lesson.outputs.cli_commands }}'
        CMD_INDEX=0

        echo "$CLI_COMMANDS" | jq -r '.[]' | while IFS= read -r CMD; do
          echo "---"
          echo "Command $((CMD_INDEX + 1)): $CMD"

          set +e
          STDOUT=$(LANG=en_US.UTF-8 sh -c "$CMD" 2>/tmp/sprintctl_stderr)
          EXIT_CODE=$?
          STDERR=$(cat /tmp/sprintctl_stderr 2>/dev/null || echo "")
          set -e

          echo "Exit code: $EXIT_CODE"
          if [ -n "$STDOUT" ]; then
            echo "Stdout: ${STDOUT:0:500}"
          fi
          if [ -n "$STDERR" ]; then
            echo "Stderr: ${STDERR:0:500}"
          fi

          RESULT=$(jq -nc \
            --arg cmd "$CMD" \
            --arg stdout "$STDOUT" \
            --arg stderr "$STDERR" \
            --argjson exit_code "$EXIT_CODE" \
            '{command: $cmd, stdout: $stdout, stderr: $stderr, exit_code: $exit_code}')

          if [ "$CMD_INDEX" -eq 0 ]; then
            echo "$RESULT" > /tmp/sprintctl_results.jsonl
          else
            echo "$RESULT" >> /tmp/sprintctl_results.jsonl
          fi

          CMD_INDEX=$((CMD_INDEX + 1))
        done

        if [ -f /tmp/sprintctl_results.jsonl ]; then
          RESULTS=$(jq -sc '.' /tmp/sprintctl_results.jsonl)
        else
          RESULTS="[]"
        fi

        echo "$RESULTS" > /tmp/sprintctl_cli_results.json
        echo "Collected results for $(echo "$RESULTS" | jq length) commands"
        echo "::endgroup::"

    # Step 5: Submit for grading
    - name: Submit for grading
      id: grade
      shell: bash
      run: |
        echo "::group::Submitting for Grading"
        LESSON_TOKEN="${{ steps.extract.outputs.lesson_token }}"
        EMAIL="${{ steps.identity.outputs.email }}"
        API_URL="${{ inputs.api-url }}"

        CLI_RESULTS=$(cat /tmp/sprintctl_cli_results.json)

        PAYLOAD=$(jq -nc \
          --arg action "submit" \
          --arg email "$EMAIL" \
          --arg user_lesson_id "$LESSON_TOKEN" \
          --argjson cli_command_results "$CLI_RESULTS" \
          '{action: $action, email: $email, user_lesson_id: $user_lesson_id, cli_command_results: $cli_command_results}')

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST \
          -H "X-API-Key: ${{ inputs.api-key }}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "${API_URL}/api/github/grade" 2>&1) || true

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" != "200" ]; then
          echo "::error::Grading submission failed (HTTP $HTTP_CODE)"
          echo "Response: $BODY"
          exit 1
        fi

        PASSED=$(echo "$BODY" | jq '[.tasks[] | select(.status == "COMPLETED")] | length')
        FAILED=$(echo "$BODY" | jq '[.tasks[] | select(.status == "FAILED")] | length')
        TOTAL=$(echo "$BODY" | jq '.tasks | length')

        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "total=$TOTAL" >> $GITHUB_OUTPUT

        if [ "$FAILED" -gt 0 ]; then
          echo "status=fail" >> $GITHUB_OUTPUT
        else
          echo "status=pass" >> $GITHUB_OUTPUT
        fi

        echo "results_json=$(echo "$BODY" | jq -c '.')" >> $GITHUB_OUTPUT

        echo ""
        echo "==============================="
        echo "  GRADING RESULTS: $PASSED/$TOTAL passed"
        echo "==============================="
        echo ""
        echo "$BODY" | jq -r '.tasks[] | (if .status == "COMPLETED" then "  ✅" else "  ❌" end) + " " + .title + " (" + .status + ")"'

        echo ""
        echo "$BODY" | jq -r '.tasks[] | select(.status == "FAILED") | "  💡 " + .title + ": " + (.ai_explanation // "No explanation provided")'
        echo "::endgroup::"

    # Step 6: Post results to GitHub App callback (if configured)
    - name: Report results to CloudSprints
      if: inputs.callback-url != ''
      shell: bash
      run: |
        echo "::group::Reporting Results"
        CALLBACK_URL="${{ inputs.callback-url }}"
        REPO="${{ github.repository }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        SHA="${{ github.event.pull_request.head.sha || github.sha }}"

        PAYLOAD=$(jq -nc \
          --arg repo "$REPO" \
          --arg pr "$PR_NUMBER" \
          --arg sha "$SHA" \
          --arg status "${{ steps.grade.outputs.status }}" \
          --argjson passed "${{ steps.grade.outputs.passed }}" \
          --argjson failed "${{ steps.grade.outputs.failed }}" \
          --argjson total "${{ steps.grade.outputs.total }}" \
          --arg lesson_token "${{ steps.extract.outputs.lesson_token }}" \
          --argjson results "${{ steps.grade.outputs.results_json }}" \
          '{
            repo: $repo,
            pr_number: ($pr | tonumber),
            sha: $sha,
            status: $status,
            passed: $passed,
            failed: $failed,
            total: $total,
            lesson_token: $lesson_token,
            results: $results
          }')

        curl -sf -X POST \
          -H "Content-Type: application/json" \
          -H "X-API-Key: ${{ inputs.api-key }}" \
          -d "$PAYLOAD" \
          "$CALLBACK_URL" || echo "::warning::Failed to report results to CloudSprints (non-fatal)"
        echo "::endgroup::"

    # Step 7: Set job status
    - name: Check grading status
      shell: bash
      run: |
        if [ "${{ steps.grade.outputs.status }}" = "fail" ]; then
          echo "::error::Grading failed: ${{ steps.grade.outputs.passed }}/${{ steps.grade.outputs.total }} tasks passed"
          exit 1
        fi
        echo "✅ All ${{ steps.grade.outputs.total }} tasks passed!"

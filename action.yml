name: 'CloudSprints Grader'
description: 'Grade CloudSprints labs via pull request. Parses lesson token from branch name (grade/<token>), collects repo files, and submits for AI grading. No API key required — authenticates via GitHub App installation.'
author: 'CloudSprints'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  api-key:
    description: 'CloudSprints API key (optional — not needed if the CloudSprints GitHub App is installed)'
    required: false
    default: ''
  api-url:
    description: 'CloudSprints API base URL'
    required: false
    default: 'https://cloudsprints.com'
  branch-prefix:
    description: 'Branch prefix that triggers grading'
    required: false
    default: 'grade/'

outputs:
  lesson-token:
    description: 'The lesson token extracted from the branch name'
    value: ${{ steps.extract.outputs.lesson_token }}
  github-username:
    description: 'The GitHub username of the PR author'
    value: ${{ steps.identity.outputs.github_username }}
  email:
    description: 'The student email detected from the PR (fallback)'
    value: ${{ steps.identity.outputs.email }}
  passed:
    description: 'Number of tasks that passed'
    value: ${{ steps.grade.outputs.passed }}
  failed:
    description: 'Number of tasks that failed'
    value: ${{ steps.grade.outputs.failed }}
  total:
    description: 'Total number of tasks'
    value: ${{ steps.grade.outputs.total }}
  status:
    description: 'Overall grading status (pass or fail)'
    value: ${{ steps.grade.outputs.status }}
  results-json:
    description: 'Full grading results as JSON'
    value: ${{ steps.grade.outputs.results_json }}

runs:
  using: 'composite'
  steps:
    # Step 1: Extract lesson token from branch name
    - name: Extract lesson token from branch
      id: extract
      shell: bash
      run: |
        BRANCH="${{ github.head_ref || github.ref_name }}"
        PREFIX="${{ inputs.branch-prefix }}"
        echo "::group::Branch Detection"
        echo "Branch: $BRANCH"
        echo "Prefix: $PREFIX"

        if [[ "$BRANCH" == ${PREFIX}* ]]; then
          LESSON_TOKEN="${BRANCH#${PREFIX}}"
          echo "Lesson token: $LESSON_TOKEN"
          echo "lesson_token=$LESSON_TOKEN" >> $GITHUB_OUTPUT
        else
          echo "::error::Branch '$BRANCH' does not start with '${PREFIX}'. Name your branch '${PREFIX}<lesson-token>' to trigger grading."
          exit 1
        fi
        echo "::endgroup::"

    # Step 2: Detect student identity
    - name: Detect student identity
      id: identity
      shell: bash
      run: |
        echo "::group::Student Identity"

        # Primary: GitHub username from PR author (always available, no noreply issues)
        GITHUB_USERNAME="${{ github.event.pull_request.user.login || github.actor }}"
        echo "GitHub username: $GITHUB_USERNAME"
        echo "github_username=$GITHUB_USERNAME" >> $GITHUB_OUTPUT

        # Secondary: try to get email from git commit (best-effort fallback)
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git fetch origin "${{ github.event.pull_request.head.sha }}" --depth=1 2>/dev/null || true
          EMAIL=$(git log -1 --format='%ae' "${{ github.event.pull_request.head.sha }}" 2>/dev/null || echo "")
        fi
        if [ -z "$EMAIL" ]; then
          EMAIL=$(git log -1 --format='%ae' 2>/dev/null || echo "")
        fi
        # Skip noreply emails — github_username is the primary identity
        if echo "$EMAIL" | grep -q 'noreply.github.com'; then
          EMAIL=""
        fi
        if [ -n "$EMAIL" ]; then
          echo "Student email: $EMAIL"
          echo "email=$EMAIL" >> $GITHUB_OUTPUT
        else
          echo "No usable email found (using GitHub username instead)"
        fi

        echo "::endgroup::"

    # Step 3: Collect repo files
    - name: Collect repo files
      id: collect
      shell: bash
      run: |
        echo "::group::Collecting Files"
        cd "$GITHUB_WORKSPACE"
        > /tmp/sprintctl_files.txt
        FILE_COUNT=0
        while IFS= read -r -d '' FILE; do
          echo "-------------" >> /tmp/sprintctl_files.txt
          echo "$FILE" >> /tmp/sprintctl_files.txt
          echo "-------------" >> /tmp/sprintctl_files.txt
          cat "$FILE" >> /tmp/sprintctl_files.txt
          echo "" >> /tmp/sprintctl_files.txt
          FILE_COUNT=$((FILE_COUNT + 1))
          echo "  Found: $FILE"
        done < <(find . -type f ! -path './.git/*' ! -path './.github/*' ! -name '.*' -print0)
        echo "Collected $FILE_COUNT files"
        FILE_OUTPUT=$(cat /tmp/sprintctl_files.txt)
        jq -nc --arg cmd "find (all repo files)" --arg stdout "$FILE_OUTPUT" --arg stderr "" --argjson exit_code 0 '[{command: $cmd, stdout: $stdout, stderr: $stderr, exit_code: $exit_code}]' > /tmp/sprintctl_cli_results.json
        echo "::endgroup::"

    # Step 4: Submit for grading
    - name: Submit for grading
      id: grade
      shell: bash
      run: |
        echo "::group::Submitting for Grading"
        LESSON_TOKEN="${{ steps.extract.outputs.lesson_token }}"
        GITHUB_USERNAME="${{ steps.identity.outputs.github_username }}"
        EMAIL="${{ steps.identity.outputs.email }}"
        API_URL="${{ inputs.api-url }}"
        REPO="${{ github.repository }}"
        SHA="${{ github.event.pull_request.head.sha || github.sha }}"

        CLI_RESULTS=$(cat /tmp/sprintctl_cli_results.json)

        PAYLOAD=$(jq -nc \
          --arg action "submit" \
          --arg github_username "$GITHUB_USERNAME" \
          --arg email "$EMAIL" \
          --arg user_lesson_id "$LESSON_TOKEN" \
          --arg repo "$REPO" \
          --arg sha "$SHA" \
          --argjson cli_command_results "$CLI_RESULTS" \
          '{action: $action, github_username: $github_username, email: $email, user_lesson_id: $user_lesson_id, repo: $repo, sha: $sha, cli_command_results: $cli_command_results}')

        # Auth: use API key header if provided, otherwise rely on repo+sha verification
        AUTH_HEADER=""
        if [ -n "${{ inputs.api-key }}" ]; then
          AUTH_HEADER="X-API-Key: ${{ inputs.api-key }}"
        fi

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST \
          ${AUTH_HEADER:+-H "$AUTH_HEADER"} \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "${API_URL}/api/github/grade" 2>&1) || true

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" != "200" ]; then
          echo "::error::Grading submission failed (HTTP $HTTP_CODE)"
          echo "Response: $BODY"
          exit 1
        fi

        PASSED=$(echo "$BODY" | jq '[.tasks[] | select(.status == "COMPLETED")] | length')
        FAILED=$(echo "$BODY" | jq '[.tasks[] | select(.status == "FAILED")] | length')
        TOTAL=$(echo "$BODY" | jq '.tasks | length')

        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "total=$TOTAL" >> $GITHUB_OUTPUT

        if [ "${FAILED:-0}" -gt 0 ]; then
          echo "status=fail" >> $GITHUB_OUTPUT
        else
          echo "status=pass" >> $GITHUB_OUTPUT
        fi

        echo "$BODY" | jq -c '.' > /tmp/sprintctl_grading_results.json
        echo "results_json=$(cat /tmp/sprintctl_grading_results.json)" >> $GITHUB_OUTPUT

        echo ""
        echo "==============================="
        echo "  GRADING RESULTS: $PASSED/$TOTAL passed"
        echo "==============================="
        echo ""
        echo "$BODY" | jq -r '.tasks[] | (if .status == "COMPLETED" then "  ✅" else "  ❌" end) + " " + .title + " (" + .status + ")"'

        echo ""
        echo "$BODY" | jq -r '.tasks[] | select(.status == "FAILED") | "  💡 " + .title + ": " + (.ai_explanation // "No explanation provided")'
        echo "::endgroup::"

    # Step 6: Post results to GitHub App (check runs + PR comments)
    - name: Report results to CloudSprints
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        echo "::group::Reporting Results"
        API_URL="${{ inputs.api-url }}"
        REPO="${{ github.repository }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        SHA="${{ github.event.pull_request.head.sha || github.sha }}"

        RESULTS_JSON=$(cat /tmp/sprintctl_grading_results.json)
        PAYLOAD=$(jq -nc \
          --arg repo "$REPO" \
          --arg pr "$PR_NUMBER" \
          --arg sha "$SHA" \
          --arg status "${{ steps.grade.outputs.status }}" \
          --argjson passed "${{ steps.grade.outputs.passed }}" \
          --argjson failed "${{ steps.grade.outputs.failed }}" \
          --argjson total "${{ steps.grade.outputs.total }}" \
          --arg lesson_token "${{ steps.extract.outputs.lesson_token }}" \
          --argjson results "$RESULTS_JSON" \
          '{
            repo: $repo,
            pr_number: ($pr | tonumber),
            sha: $sha,
            status: $status,
            passed: $passed,
            failed: $failed,
            total: $total,
            lesson_token: $lesson_token,
            results: $results
          }')

        AUTH_HEADER=""
        if [ -n "${{ inputs.api-key }}" ]; then
          AUTH_HEADER="X-API-Key: ${{ inputs.api-key }}"
        fi

        curl -sf -X POST \
          ${AUTH_HEADER:+-H "$AUTH_HEADER"} \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "${API_URL}/api/github/grading-result" || echo "::warning::Failed to report results to CloudSprints (non-fatal)"
        echo "::endgroup::"

    # Step 7: Set job status
    - name: Check grading status
      shell: bash
      run: |
        if [ "${{ steps.grade.outputs.status }}" = "fail" ]; then
          echo "::error::Grading failed: ${{ steps.grade.outputs.passed }}/${{ steps.grade.outputs.total }} tasks passed"
          exit 1
        fi
        echo "✅ All ${{ steps.grade.outputs.total }} tasks passed!"
